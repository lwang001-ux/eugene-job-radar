<!DOCTYPE html>
<html>
<head>
<title>SoCal Creative Job Bot</title>

<style>
body {
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.job {
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button {
margin-right:10px;
padding:6px 10px;
border-radius:6px;
border:none;
background:#2a6df4;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Southern California Creative + Maker Job Radar</h1>

<div id="jobs"></div>

<script>

fetch("dashboard_jobs.json")
.then(r => r.json())
.then(data => {

let container = document.getElementById("jobs")

data.forEach(job => {

let div = document.createElement("div")
div.className = "job"

div.innerHTML = `
<h3>${job.title}</h3>
<p>${job.company}<br>${job.location}</p>

<a href="${job.link}" target="_blank">View Job</a>

<br><br>

<button onclick='saveJob(${JSON.stringify(job)})'>⭐ Save</button>
`

container.appendChild(div)

})

})

function saveJob(job){

let saved = JSON.parse(localStorage.getItem("savedJobs") || "[]")

saved.push(job)

localStorage.setItem("savedJobs", JSON.stringify(saved))

alert("Saved ⭐")

}

</script>

</body>
</html>
