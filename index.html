<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoCal Creative Job Bot</title>

<style>

body{
background:#faf6ee;
font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
padding:40px;
color:#243042;
}

.layout{
display:grid;
grid-template-columns:1fr 360px;
gap:30px;
align-items:start;
}

h1{
font-weight:300;
letter-spacing:.3px;
margin-bottom:10px;
}

.instructions{
font-family:Menlo, Monaco, monospace;
font-size:15px;
color:#b45353;
opacity:.65;
margin-bottom:30px;
}

.job,.sidebar-card{
background:white;
border-radius:12px;
padding:24px;
border:1px solid #ece9e1;
margin-bottom:20px;
}

button,a.btn{
padding:10px 16px;
border-radius:8px;
border:1px solid #d7dbe3;
background:white;
cursor:pointer;
margin-right:10px;
text-decoration:none;
display:inline-block;
font-family:Menlo, Monaco, monospace;
font-size:14px;
color:#2c3a55;
transition:.2s;
}

button:hover,a.btn:hover{
border-color:#1e3a8a;
color:#1e3a8a;
}

.primary{
border-color:#1e3a8a;
color:#1e3a8a;
}

.secondary{
border-color:#e9b4b4;
color:#a43d3d;
}

textarea{
width:100%;
min-height:160px;
margin-top:14px;
border-radius:8px;
border:1px solid #e5e7eb;
padding:12px;
font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
}

.saved-meta{
color:#7b8594;
font-size:14px;
margin-top:6px;
}

.count{
font-size:14px;
color:#7b8594;
margin-bottom:10px;
}

@media(max-width:900px){
.layout{grid-template-columns:1fr}
}

</style>
</head>

<body>

<div class="layout">

<main>

<h1>Southern California Creative + Maker Job Radar</h1>
<p class="instructions">Save favorites. Track submitted applications. Generate and edit cover letters.</p>

<div id="jobs"></div>

</main>


<aside>

<div class="sidebar-card">

<h2>Saved Jobs</h2>
<div class="count" id="savedCount"></div>

<div id="savedJobs"></div>

</div>

</aside>

</div>


<script>

const SAVED_KEY="savedJobsV4"

function loadSaved(){
return JSON.parse(localStorage.getItem(SAVED_KEY)||"[]")
}

function saveSaved(data){
localStorage.setItem(SAVED_KEY,JSON.stringify(data))
}

function jobId(job){
return job.title+"-"+job.company+"-"+job.location
}

function saveJob(job){

let saved=loadSaved()

let id=jobId(job)

if(saved.find(x=>x.id===id)){
alert("Already saved")
return
}

saved.push({
id:id,
title:job.title,
company:job.company,
location:job.location,
link:job.link,
savedDate:new Date().toLocaleDateString(),
applied:false,
appliedDate:""
})

saveSaved(saved)

renderSaved()

}

function toggleApplied(id){

let saved=loadSaved()

let item=saved.find(x=>x.id===id)

item.applied=!item.applied

item.appliedDate=item.applied?new Date().toLocaleDateString():""

saveSaved(saved)

renderSaved()

}

function deleteSaved(id){

let saved=loadSaved().filter(x=>x.id!==id)

saveSaved(saved)

renderSaved()

}

function generateLetter(job){

return `Dear ${job.company},

I am excited to apply for the ${job.title} role in ${job.location}.

My background combines strong visual design, creative thinking, and experience collaborating with teams.

I would welcome the opportunity to contribute my skills and learn more about your work.

Sincerely,
Eugene Wang`
}

function showLetter(button,job){

let wrap=button.closest(".job").querySelector(".letterWrap")

let letter=generateLetter(job)

wrap.innerHTML=`
<div class="instructions">Edit the letter below. Export or delete when finished.</div>

<textarea>${letter}</textarea>

<br><br>

<button class="primary" onclick="exportLetter(this)">Export Letter</button>

<button class="secondary" onclick="deleteLetter(this)">Delete Letter</button>
`

}

function exportLetter(btn){

let text=btn.parentElement.querySelector("textarea").value

let blob=new Blob([text],{type:"text/plain"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="cover-letter.txt"

a.click()

}

function deleteLetter(btn){

btn.parentElement.innerHTML=""

}

function renderJobs(data){

let container=document.getElementById("jobs")

container.innerHTML=""

data.forEach(job=>{

let div=document.createElement("div")

div.className="job"

div.innerHTML=`

<h3>${job.title}</h3>

<p>${job.company}<br>${job.location}</p>

<a class="btn primary" href="${job.link}" target="_blank">View Job</a>

<button class="secondary" onclick='saveJob(${JSON.stringify(job)})'>⭐ Save Favorite</button>

<button class="secondary" onclick='showLetter(this,${JSON.stringify(job)})'>Generate Cover Letter</button>

<div class="letterWrap"></div>

`

container.appendChild(div)

})

}

function renderSaved(){

let container=document.getElementById("savedJobs")

let count=document.getElementById("savedCount")

let saved=loadSaved()

count.innerText=saved.length+" saved"

container.innerHTML=""

saved.forEach(job=>{

let div=document.createElement("div")

div.className="job"

div.innerHTML=`

<h3>${job.title}</h3>

<div class="saved-meta">

${job.company}<br>

${job.location}<br>

Saved: ${job.savedDate}

</div>

<br>

<a class="btn primary" href="${job.link}" target="_blank">Open Job</a>

<button class="secondary" onclick="toggleApplied('${job.id}')">

${job.applied?"Resume + Cover Letter Sent":"Mark Resume + Cover Letter Sent"}

</button>

<button class="secondary" onclick="deleteSaved('${job.id}')">Delete</button>

<div class="saved-meta">

${job.applied?"Submitted: "+job.appliedDate:"Not submitted yet"}

</div>

`

container.appendChild(div)

})

}

fetch("data/dashboard_jobs.json")
.then(r=>r.json())
.then(data=>{
renderJobs(data)
renderSaved()
})
.catch(()=>{
renderSaved()
})

</script>

</body>
</html>
