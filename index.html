<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoCal Creative Job Bot</title>
  <style>
    body{font-family:Arial;background:#f5f7fb;padding:28px;color:#1f2937}
    .layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
    .job,.sidebar-card{background:white;padding:18px;border-radius:12px;border:1px solid #dbe3ef;margin-bottom:16px}
    button,a.btn{margin-right:10px;padding:8px 12px;border-radius:8px;border:none;background:#2563eb;color:white;cursor:pointer;text-decoration:none;display:inline-block}
    .secondary{background:#eef4ff;color:#2563eb}
    textarea{width:100%;min-height:140px;border:1px solid #dbe3ef;border-radius:10px;padding:10px;font:inherit}
    .muted{color:#6b7280}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="layout">
    <main>
      <h1>Southern California Creative + Maker Job Radar</h1>
      <p class="muted">Save favorites, track sent applications, and generate editable cover letters.</p>
      <div id="jobs"></div>
    </main>
    <aside>
      <div class="sidebar-card">
        <h2>Saved Jobs</h2>
        <p class="muted">Saved in this browser on this device.</p>
        <div id="savedJobs"></div>
      </div>
    </aside>
  </div>

<script>
const DASHBOARD_FILE = "dashboard_jobs.json";
const SAVED_KEY = "savedJobsV2";

function loadSaved(){
  try { return JSON.parse(localStorage.getItem(SAVED_KEY) || "[]"); }
  catch(e){ return []; }
}

function saveSaved(items){
  localStorage.setItem(SAVED_KEY, JSON.stringify(items));
}

function jobId(job){
  return [job.title||"", job.company||"", job.location||"", job.link||""].join(" | ");
}

function saveJob(job){
  const saved = loadSaved();
  const id = jobId(job);
  if (saved.find(x => x.id === id)) {
    alert("This job is already saved.");
    return;
  }
  saved.push({
    id:id,
    title:job.title||"",
    company:job.company||"",
    location:job.location||"",
    link:job.link||"",
    savedAt:new Date().toLocaleString(),
    applied:false,
    appliedDate:"",
    notes:""
  });
  saveSaved(saved);
  renderSavedJobs();
  alert("Saved ⭐");
}

function removeSaved(id){
  const saved = loadSaved().filter(x => x.id !== id);
  saveSaved(saved);
  renderSavedJobs();
}

function toggleApplied(id){
  const saved = loadSaved();
  const item = saved.find(x => x.id === id);
  if (!item) return;
  item.applied = !item.applied;
  item.appliedDate = item.applied ? new Date().toLocaleDateString() : "";
  saveSaved(saved);
  renderSavedJobs();
}

function updateNotes(id, value){
  const saved = loadSaved();
  const item = saved.find(x => x.id === id);
  if (!item) return;
  item.notes = value;
  saveSaved(saved);
}

function generateCoverLetter(job){
  return `Dear ${job.company || "Hiring Team"},

I am excited to apply for the ${job.title || "position"} role${job.company ? " at " + job.company : ""}${job.location ? " in " + job.location : ""}.

My background combines strong visual design, creativity, and experience working with students and collaborative teams. I would be excited to contribute thoughtful ideas, strong communication, and a hands-on approach to this role.

I would welcome the opportunity to discuss how my experience and interests align with your needs.

Sincerely,
Eugene Wang`;
}

function showLetter(button, job){
  const wrap = button.closest(".job").querySelector(".letter-wrap");
  wrap.innerHTML = `<textarea>${generateCoverLetter(job)}</textarea>`;
}

function renderJobs(data){
  const container = document.getElementById("jobs");
  container.innerHTML = "";
  if (!data || !data.length) {
    container.innerHTML = '<div class="job"><p class="muted">No jobs found yet.</p></div>';
    return;
  }

  data.forEach(job => {
    const div = document.createElement("div");
    div.className = "job";
    div.innerHTML = `
      <h3>${job.title || ""}</h3>
      <p class="muted">${job.company || ""}<br>${job.location || ""}</p>
      <a class="btn" href="${job.link || "#"}" target="_blank" rel="noopener">View Job</a>
      <button class="secondary" onclick='saveJob(${JSON.stringify(job)})'>⭐ Save Favorite</button>
      <button class="secondary" onclick='showLetter(this, ${JSON.stringify(job)})'>✉ Generate Cover Letter</button>
      <div class="letter-wrap" style="margin-top:12px"></div>
    `;
    container.appendChild(div);
  });
}

function renderSavedJobs(){
  const container = document.getElementById("savedJobs");
  const saved = loadSaved();
  if (!saved.length) {
    container.innerHTML = '<p class="muted">No saved jobs yet.</p>';
    return;
  }

  container.innerHTML = "";
  saved.forEach(item => {
    const div = document.createElement("div");
    div.className = "job";
    const safeId = item.id.replace(/'/g, "\'");
    div.innerHTML = `
      <h3>${item.title}</h3>
      <p class="muted">${item.company}<br>${item.location}<br>Saved: ${item.savedAt}</p>
      <a class="btn" href="${item.link}" target="_blank" rel="noopener">Open Job</a>
      <button class="secondary" onclick="toggleApplied('${safeId}')">${item.applied ? "✅ Resume + Cover Letter Sent" : "Mark Resume + Cover Letter Sent"}</button>
      <button class="secondary" onclick="removeSaved('${safeId}')">Remove</button>
      <p class="muted" style="margin-top:10px">${item.applied ? "Sent on: " + item.appliedDate : "Not yet sent"}</p>
      <div style="margin-top:10px"><strong>Notes</strong></div>
      <textarea oninput="updateNotes('${safeId}', this.value)">${item.notes || ""}</textarea>
      <div style="margin-top:10px"><strong>Cover Letter Draft</strong></div>
      <textarea>${generateCoverLetter(item)}</textarea>
    `;
    container.appendChild(div);
  });
}

fetch(DASHBOARD_FILE)
  .then(r => r.json())
  .then(data => { renderJobs(data); renderSavedJobs(); })
  .catch(() => { renderJobs([]); renderSavedJobs(); });
</script>
</body>
</html>
